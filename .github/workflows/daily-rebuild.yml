name: Rotate seed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: rotate-seed
  cancel-in-progress: false

jobs:
  bump:
    name: Bump rotation nonce
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Bump rotation nonce
        run: node scripts/bump-nonce.mjs
      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rotation-nonce.json
          if git diff --staged --quiet; then
            echo "No nonce change."
            exit 0
          fi
          N=$(node -e "console.log(require('./data/rotation-nonce.json').nonce)")
          git commit -m "chore: bump rotation nonce to ${N}"
          git push origin main
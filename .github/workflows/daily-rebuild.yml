name: Rotate seed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: rotate-seed
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bump:
    name: Bump rotation nonce
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Bump rotation nonce
        run: node scripts/bump-nonce.mjs
      - name: Rotate DOM seed
        run: node scripts/rotate-seed.mjs
      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rotation-nonce.json data/dom-seed.json
          if git diff --staged --quiet; then
            echo "No rotation change."
            exit 0
          fi
          N=$(node -e "console.log(require('./data/rotation-nonce.json').nonce)")
          BUILD=$(node -e "console.log(require('./data/dom-seed.json').buildId)")
          git commit -m "chore: bump rotation nonce to ${N}, rotate DOM seed to ${BUILD}"
          git push origin main